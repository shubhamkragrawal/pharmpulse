services:
  postgres:
    image: postgres:16
    container_name: pharmapulse_postgres
    restart: unless-stopped
    shm_size: '256mb'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_raw_schema.sql:/docker-entrypoint-initdb.d/01_init_raw_schema.sql:ro
      - ./scripts/init_ops_schema.sql:/docker-entrypoint-initdb.d/02_init_ops_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  streamlit:
    build: ./streamlit
    container_name: pharmapulse_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      READONLY_USER: pharmapulse_readonly
      READONLY_PASSWORD: ${READONLY_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
